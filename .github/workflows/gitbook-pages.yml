name: Deploy GitBook to GitHub Pages

on:
  push:
    branches: [ main, master, feat/profiling-and-optimization ]
    paths:
      - 'gitbook/**'
      - '.github/workflows/gitbook-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HonKit
        run: |
          npm --version
          npm install -g honkit
          honkit --version

      - name: Build GitBook
        run: |
          mkdir -p public
          cd gitbook
          honkit build . ../public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
