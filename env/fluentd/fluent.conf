# Fluentd config: receive logs and forward to Loki via HTTP
# Inputs: HTTP (9880), Forward (24224)

<source>
  @type http
  port 9880
  bind 0.0.0.0
</source>

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Add common labels
<filter **>
  @type record_transformer
  enable_ruby true
  <record>
    app ${record["app"] || "interviewing-golang"}
    env dev
  </record>
</filter>

# Output to Loki
<match **>
  @type loki
  url http://loki:3100
  extra_labels {"job":"fluentd"}
  label_keys app,env
  log_level info
  flush_interval 5s
</match>
