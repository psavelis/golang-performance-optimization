networks:
  profiling:
    driver: bridge

volumes:
  grafana-data: {}
  pyroscope-data: {}
  prometheus-data: {}
  tempo-data: {}
  loki-data: {}
  elastic-data: {}
  logstash-pipeline: {}

services:
  postgres:
    # Postgres instance
    container_name: postgres
    image: library/postgres:17.4
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=test
    volumes:
      - ./data/postgres/00-schema.sql:/docker-entrypoint-initdb.d/00-schema.sql
    networks:
      - profiling

  pyroscope:
    image: grafana/pyroscope:1.6.0
    container_name: pyroscope
    restart: unless-stopped
    command: ["server"]
    environment:
      - PYROSCOPE_LOG_LEVEL=info
    ports:
      - "4040:4040"
    volumes:
      - pyroscope-data:/var/lib/pyroscope
    networks:
      - profiling

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-pyroscope-app
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - profiling

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - profiling

  otel-collector:
    image: otel/opentelemetry-collector:0.108.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
    networks:
      - profiling

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    ports:
      - "3200:3200"   # Tempo HTTP API / Jaeger UI proxy
    expose:
      - "4317"        # OTLP gRPC (internal only for otel-collector)
    volumes:
      - tempo-data:/var/tempo
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
    networks:
      - profiling

  loki:
    image: grafana/loki:3.1.1
    container_name: loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/var/loki
      - ./loki/config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - profiling

  fluentd:
    build:
      context: ./fluentd
    container_name: fluentd
    restart: unless-stopped
    ports:
      - "9880:9880"     # HTTP input
      - "24224:24224"   # Forward TCP
      - "24224:24224/udp"
    volumes:
      - ./fluentd/fluent.conf:/fluentd/etc/fluent.conf:ro
    depends_on:
      - loki
    networks:
      - profiling

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    networks:
      - profiling

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - profiling

  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.3
    container_name: logstash
    restart: unless-stopped
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "8080:8080"   # HTTP input
      - "5000:5000"   # TCP input
      - "9600:9600"   # Monitoring API
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    depends_on:
      - elasticsearch
    networks:
      - profiling

  